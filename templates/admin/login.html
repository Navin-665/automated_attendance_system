<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e;
               display: flex; justify-content: center; align-items: center;
               height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px;
                width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        h2 { color: #2c3e50; margin-bottom: 8px; }
        p  { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px;
                border: 1px solid #ddd; border-radius: 6px;
                font-size: 15px; }
        button { width: 100%; padding: 12px; background: #2c3e50;
                 color: white; border: none; border-radius: 6px;
                 font-size: 16px; cursor: pointer; }
        button:hover { background: #34495e; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Admin Login</h2>
        <p>Attendance System Backend</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="text"     name="username"
                   placeholder="Username" required>
            <input type="password" name="password"
                   placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
